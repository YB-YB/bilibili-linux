# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Build Packages

on:
  release:
    types: [published]
  push:
    tags:        
      - v*
    branches: [ master, dev, ci]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [ master ]
  workflow_dispatch: # 启用手动触发

jobs:
  build-app:
    name: Build Base Packages
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
        ARCH: ['x64']

    steps:
      - uses: actions/checkout@v4  # 升级到v4修复兼容性
        with:
          submodules: 'recursive'
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.15.0'
          cache: 'pnpm'  # 启用pnpm缓存

      - name: Prepare (Fix PNPM Path)
        run: |
          sudo apt update && sudo apt install -y wget exiftool
          sudo npm install asar -g
          # 正确配置pnpm并立即生效PATH
          corepack enable
          pnpm setup || true
          # 手动添加pnpm到PATH（关键修复）
          echo "PATH=$HOME/.local/share/pnpm:$PATH" >> $GITHUB_ENV
          # 验证pnpm是否可用
          pnpm --version
          # 安装依赖（替换npm为pnpm）
          pnpm install
          echo "$UID, $GID"

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [ 'true' == ${{ startsWith(github.ref, 'refs/tags/') }} ];then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag result: $tag - $name"
          echo "::set-output name=tag::$tag"
          echo "::set-output name=name::$name"
         
      - name: Build
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          tools/update-bilibili.sh
          tools/fix-other.sh
          tools/extension.sh
          mv tmp/bili/resources/* app
  
      - name: Compress Resources
        run: |
          ls -l
          mkdir -p tmp/src
          mkdir -p tmp/build
          tar -zcf tmp/src/bilibili-asar-${{ steps.tag.outputs.tag }}.tar.gz bin app # electron
          cp tmp/src/bilibili-asar-${{ steps.tag.outputs.tag }}.tar.gz tmp/build/bilibili-asar-${{ steps.tag.outputs.tag }}.tar.gz
          tar -zcf tmp/build/extensions-${{ steps.tag.outputs.tag }}.tar.gz dist/extension

      - name: Fix name for continuous
        if: steps.tag.outputs.tag == 'continuous'
        run: |
          version=$(cat conf/bilibili_version)
          mv ./tmp/build/bilibili-asar-continuous.tar.gz ./tmp/build/bilibili-asar-${version}-continuous.tar.gz
          mv ./tmp/build/extensions-${{ steps.tag.outputs.tag }}.tar.gz ./tmp/build/extensions-${version}-continuous.tar.gz

      - name: Upload artifact (src)
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
      - name: Upload artifact (build)
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-app.build
          path: tmp/build

  build-linux-simple:
    name: Build Linux Archive
    needs:
      - build-app
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x]
        ARCH: ['x64', 'arm64', 'loong64', 'loongarch64']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16.x

      - name: Prepare
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          sudo apt update && sudo apt install -y wget exiftool
          sudo npm install asar -g
          echo "$UID, $GID"
          ls -l
          tools/build-prepare.sh

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [ 'true' == ${{ startsWith(github.ref, 'refs/tags/') }} ];then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag result: $tag - $name"
          echo "::set-output name=tag::$tag"
          echo "::set-output name=name::$name"
         
      - name: Build
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          tools/update-electron.sh
  
      - name: Compress Resources
        run: |
          ls -l
          mkdir -p tmp/src
          mkdir -p tmp/build
          version=$(cat conf/bilibili_version)
          tar -zcf tmp/build/bilibili-${version}-${{ steps.tag.outputs.tag }}-${{ matrix.ARCH }}.tar.gz bin app electron
          
      - name: Fix name for continuous
        if: steps.tag.outputs.tag != 'continuous'
        run: |
          version=$(cat conf/bilibili_version)
          mv ./tmp/build/bilibili-${version}-${{ steps.tag.outputs.tag }}-${{ matrix.ARCH }}.tar.gz ./tmp/build/bilibili-${{ steps.tag.outputs.tag }}-${{ matrix.ARCH }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-archiev.build
          path: tmp/build

  build-linux-package:
    name: Build Linux Package
    needs:
      - build-app
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x]
        ARCH: ['x64', 'loong64']

    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm' # 启用pnpm缓存

      - name: Prepare (Fix PNPM Path)
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          sudo npm install asar -g
          # 正确配置pnpm
          corepack enable
          corepack enable pnpm
          corepack use pnpm@latest
          # 手动添加pnpm到PATH（关键修复）
          echo "PATH=$HOME/.local/share/pnpm:$PATH" >> $GITHUB_ENV
          # 验证pnpm
          pnpm --version
          pnpm install
          echo "$UID, $GID"

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [ 'true' == ${{ startsWith(github.ref, 'refs/tags/') }} ];then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag result: $tag - $name"
          echo "::set-output name=tag::$tag"
          echo "::set-output name=name::$name"
         
      - name: Build
        env:
          BUILD_VERSION: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          mkdir -p tmp/build
          tools/build-prepare.sh
          asar e app/app.asar app/app
          if [[ "$BUILD_ARCH" == loong* ]];then
            pnpm run pkg-loongarch
          else
            pnpm run pkg-linux
          fi
          rm -rf tmp/build/*-unpacked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-linuxpkg.build
          path: tmp/build

  build-win:
    name: Build Windows
    needs:
      - build-app
    runs-on: ubuntu-latest
    container: scottyhardy/docker-wine
    strategy:
      matrix:
        node-version: [16.x]
        ARCH: ['x64']

    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Windows构建用npm

      - name: Prepare
        run: |
          set -x
          echo $SHELL
          cat /etc/issue
          apt update && apt install -y wget
          npm install asar -g
          npm install
          echo "$UID"

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [ 'true' == ${{ startsWith(github.ref, 'refs/tags/') }} ];then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag result: $tag - $name"
          echo "::set-output name=tag::$tag"
          echo "::set-output name=name::$name"
         
      - name: Build
        env:
          BUILD_VERSION: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          # from @Xarth-Mai
          sudo chown -R $(whoami) /github/home
          mkdir -p tmp/build
          tools/build-prepare.sh
          asar e app/app.asar app/app
          npm run pkg-win
          rm -rf tmp/build/*-unpacked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-winpkg.build
          path: tmp/build

  build-deepin:
    name: Build Deepin Package
    needs:
      - build-app
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ARCH: ['x64', 'arm64', 'loong64']

    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src

      - name: Prepare
        run: |
          sudo apt update && sudo apt-get install -y build-essential fakeroot devscripts debhelper

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [ 'true' == ${{ startsWith(github.ref, 'refs/tags/') }} ];then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          else
            BILIBILI_VERSION=$(cat conf/bilibili_version)
            tag="v${BILIBILI_VERSION}-${tag}"
          fi
          echo "tag result: $tag - $name"
          echo "::set-output name=tag::$tag"
          echo "::set-output name=name::$name"

      - name: Build Deb Package
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
          BUILD_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          export BUILD_VERSION=${{ steps.tag.outputs.tag }}
          ls -l
          mkdir -p tmp/build
          tools/build-prepare.sh
          echo "${{ matrix.ARCH }}"
          if [ "${{ matrix.ARCH }}" == "arm64" ];then
            export LD_LIBRARY_PATH="/usr/aarch64-linux-gnu/lib"
          fi
          tools/update-electron.sh
          if [ "$BUILD_ARCH" == "x64" ];then
            export BUILD_ARCH="amd64"
          fi
          dpkg --version
          if [[ "$BUILD_ARCH" == loong* ]];then
            echo "build loong"
            export DOCKER_UID=$(id -u)
            export DOCKER_GID=$(id -g)
            cat /etc/passwd
            env
            tools/build-deepin-loongarch.sh
            if [ -f tmp/exit_code ];then
              exit $(cat tmp/exit_code)
            fi
          else
            echo "build simple"
            tools/build-deepin.sh ${{ steps.tag.outputs.tag }}
            mkdir -p info/DEBIAN
            dpkg -e ./tmp/build/io.github.msojocs.bilibili_*.deb info/DEBIAN
            ls -l info/DEBIAN
            rm -rf info
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-deepinpkg.build
          path: tmp/build

  upload:
    name: Create release and upload artifacts
    needs:
      - build-linux-simple
      - build-linux-package
      - build-win
      - build-deepin
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Inspect directory after downloading artifacts
        run: |
          rm -rf ./bilibili-app.src
          ls -alFR

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [ 'true' == ${{ startsWith(github.ref, 'refs/tags/') }} ];then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag result: $tag - $name"
          echo "::set-output name=tag::$tag"
          echo "::set-output name=name::$name"

      - name: Create release and upload artifacts (continuous)
        if: startsWith(github.ref, 'refs/heads/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt install -y fuse
          wget -q https://github.com/TheAssassin/pyuploadtool/releases/download/continuous/pyuploadtool-x86_64.AppImage
          chmod +x pyuploadtool-x86_64.AppImage
          ./pyuploadtool-x86_64.AppImage \
          **build/*.tar.gz \
          **build/*.AppImage \
          **build/*.deb \
          **build/*.exe \
          **build/*.rpm

      - name: Release (tagged)
        uses: softprops/action-gh-release@v2 # 升级到v2修复兼容性
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ${{ steps.tag.outputs.name }}
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            **build/*.tar.gz
            **build/*.AppImage
            **build/*.deb
            **build/*.exe
            **build/*.rpm
