# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Build Packages

on:
  release:
    types: [published]
  push:
    tags:        
      - v*
    branches: [ master, dev, ci]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [ master ]
  # # Allows you to run this workflow manually from the Actions tab
  # workflow_dispatch:

jobs:
  build-app:
    name: Build Base Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
        ARCH: ['x64']
    steps:
      - uses: actions/checkout@v4  # 升级到v4
        with:
          submodules: 'recursive'
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.15.0'
          cache: 'npm'  # 新增npm缓存

      - name: Prepare
        run: |
          sudo apt update && sudo apt install -y wget exiftool
          sudo npm install asar -g
          corepack enable
          pnpm setup
          source $HOME/.bashrc  # 确保pnpm生效
          npm install
          echo "UID: $UID, GID: $GID"

      - name: Generate TAG
        id: Tag
        run: |
          tag="continuous"
          name="Continuous Build"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then  # 简化条件判断
            tag="${{ github.ref_name }}"
            name="${{ github.ref_name }}"
          fi
          echo "tag result: $tag - $name"
          echo "tag=$tag" >> $GITHUB_OUTPUT  # 替换废弃的set-output
          echo "name=$name" >> $GITHUB_OUTPUT
         
      - name: Build
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          tools/update-bilibili.sh
          tools/fix-other.sh
          tools/extension.sh
          mv tmp/bili/resources/* app
  
      - name: Compress Resources
        run: |
          ls -l
          mkdir -p tmp/src tmp/build
          tar -zcf tmp/src/bilibili-asar-${{ steps.Tag.outputs.tag }}.tar.gz bin app # electron
          cp tmp/src/bilibili-asar-${{ steps.Tag.outputs.tag }}.tar.gz tmp/build/
          tar -zcf tmp/build/extensions-${{ steps.Tag.outputs.tag }}.tar.gz dist/extension

      - name: Fix name for continuous
        if: steps.Tag.outputs.tag == 'continuous'
        run: |
          version=$(cat conf/bilibili_version)
          mv ./tmp/build/bilibili-asar-continuous.tar.gz ./tmp/build/bilibili-asar-${version}-continuous.tar.gz
          mv ./tmp/build/extensions-continuous.tar.gz ./tmp/build/extensions-${version}-continuous.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-app.build
          path: tmp/build

  # -------------------------- Linux 归档包（核心修改） --------------------------
  build-linux-simple:
    name: Build Linux Archive
    needs: [build-app]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]  # 淘汰16.x，升级到LTS 20.x
        ARCH: ['x64', 'arm64', 'loong64', 'loongarch64']
    steps:
      - uses: actions/checkout@v4  # 升级到v4
        with:
          submodules: 'recursive'
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
      - name: Use Node.js
        uses: actions/setup-node@v4  # 统一升级到v4
        with:
          node-version: '20.x'
          cache: 'npm'  # 新增缓存

      - name: Prepare
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          sudo apt update && sudo apt install -y wget exiftool
          sudo npm install asar -g
          echo "UID: $UID, GID: $GID"
          ls -l
          chmod +x tools/build-prepare.sh  # 确保脚本可执行
          tools/build-prepare.sh

      - name: Generate TAG
        id: Tag
        run: |
          tag="continuous"
          name="Continuous Build"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${{ github.ref_name }}"
            name="${{ github.ref_name }}"
          fi
          echo "tag result: $tag - $name"
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT
         
      - name: Build
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          chmod +x tools/update-electron.sh
          tools/update-electron.sh
  
      - name: Compress Resources
        run: |
          ls -l
          mkdir -p tmp/src tmp/build
          version=$(cat conf/bilibili_version)
          tar -zcf tmp/build/bilibili-${version}-${{ steps.Tag.outputs.tag }}-${{ matrix.ARCH }}.tar.gz bin app electron
          
      - name: Fix name for tagged release
        if: steps.Tag.outputs.tag != 'continuous'  # 修正注释，逻辑更清晰
        run: |
          version=$(cat conf/bilibili_version)
          mv ./tmp/build/bilibili-${version}-${{ steps.Tag.outputs.tag }}-${{ matrix.ARCH }}.tar.gz ./tmp/build/bilibili-${{ steps.Tag.outputs.tag }}-${{ matrix.ARCH }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-archive.build  # 修正拼写错误：archiev → archive
          path: tmp/build

  # -------------------------- Linux 通用包（核心修改） --------------------------
  build-linux-package:
    name: Build Linux Package
    needs: [build-app]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]  # 淘汰16.x，升级到LTS 20.x
        ARCH: ['x64', 'loong64']
    steps:
      - uses: actions/checkout@v4  # 升级到v4
        with:
          submodules: 'recursive'
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'  # 统一到20.x
          cache: 'pnpm'  # 适配pnpm缓存

      - name: Prepare
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          sudo npm install asar -g
          npm install -g corepack@latest
          corepack enable pnpm
          corepack use pnpm@latest
          pnpm install --frozen-lockfile  # 锁定依赖版本，提升稳定性
          echo "UID: $UID, GID: $GID"

      - name: Generate TAG
        id: Tag
        run: |
          tag="continuous"
          name="Continuous Build"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${{ github.ref_name }}"
            name="${{ github.ref_name }}"
          fi
          echo "tag result: $tag - $name"
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT
         
      - name: Build
        env:
          BUILD_VERSION: ${{ steps.Tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          mkdir -p tmp/build
          chmod +x tools/build-prepare.sh
          tools/build-prepare.sh
          asar e app/app.asar app/app
          if [[ "$BUILD_ARCH" == loong* ]]; then
            pnpm run pkg-loongarch
          else
            pnpm run pkg-linux
          fi
          rm -rf tmp/build/*-unpacked
          # tools/build-appimage.sh ${{ steps.Tag.outputs.tag }} ${{ matrix.ARCH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-linuxpkg.build
          path: tmp/build

  # -------------------------- Deepin 包（核心修改） --------------------------
  build-deepin:
    name: Build Deepin Package
    needs: [build-app]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ARCH: ['x64', 'arm64', 'loong64']
    steps:
      - uses: actions/checkout@v4  # 升级到v4
        with:
          submodules: 'recursive'
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src

      - name: Prepare
        run: |
          sudo apt update && sudo apt-get install -y \
            build-essential fakeroot devscripts debhelper \
            dpkg-dev  # 补充依赖，避免构建deb缺失工具

      - name: Generate TAG
        id: Tag
        run: |
          tag="continuous"
          name="Continuous Build"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${{ github.ref_name }}"
            name="${{ github.ref_name }}"
          else
            BILIBILI_VERSION=$(cat conf/bilibili_version)
            tag="v${BILIBILI_VERSION}-${tag}"
          fi
          echo "tag result: $tag - $name"
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT

      - name: Build Deb Package
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
          BUILD_TAG: ${{ steps.Tag.outputs.tag }}
        run: |
          export BUILD_VERSION="${{ steps.Tag.outputs.tag }}"
          ls -l
          mkdir -p tmp/build
          chmod +x tools/build-prepare.sh tools/update-electron.sh
          tools/build-prepare.sh
          echo "Building for arch: $BUILD_ARCH"
          
          # 架构映射（deb包标准架构名）
          if [ "${BUILD_ARCH}" == "x64" ]; then
            export DEB_ARCH="amd64"
          elif [ "${BUILD_ARCH}" == "arm64" ]; then
            export DEB_ARCH="arm64"
            export LD_LIBRARY_PATH="/usr/aarch64-linux-gnu/lib"
          elif [[ "${BUILD_ARCH}" == loong* ]]; then
            export DEB_ARCH="loongarch64"
          fi
          
          tools/update-electron.sh
          
          if [[ "$BUILD_ARCH" == loong* ]]; then
            echo "Building for LoongArch"
            export DOCKER_UID=$(id -u)
            export DOCKER_GID=$(id -g)
            cat /etc/passwd
            env
            chmod +x tools/build-deepin-loongarch.sh
            tools/build-deepin-loongarch.sh
            if [ -f tmp/exit_code ]; then
              exit $(cat tmp/exit_code)
            fi
          else
            echo "Building standard deb package"
            chmod +x tools/build-deepin.sh
            tools/build-deepin.sh "${{ steps.Tag.outputs.tag }}"
            mkdir -p info/DEBIAN
            dpkg -e ./tmp/build/io.github.msojocs.bilibili_*.deb info/DEBIAN
            ls -l info/DEBIAN
            rm -rf info
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-deepinpkg.build
          path: tmp/build

  # -------------------------- 保留原有Windows构建（未修改） --------------------------
  build-win:
    name: Build Windows
    needs: [build-app]
    runs-on: ubuntu-latest
    container: scottyhardy/docker-wine
    strategy:
      matrix:
        node-version: [16.x]
        ARCH: ['x64']
    steps:
      - uses: actions/checkout@v2
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Prepare
        run: |
          set -x
          echo $SHELL
          cat /etc/issue
          apt update
          npm install asar -g
          npm install
          echo "$UID"

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [ 'true' == ${{ startsWith(github.ref, 'refs/tags/') }} ];then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag result: $tag - $name"
          echo "::set-output name=tag::$tag"
          echo "::set-output name=name::$name"
         
      - name: Build
        env:
          BUILD_VERSION: ${{ steps.Tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          # from @Xarth-Mai
          sudo chown -R $(whoami) /github/home
          mkdir -p tmp/build
          tools/build-prepare.sh
          asar e app/app.asar app/app
          npm run pkg-win
          rm -rf tmp/build/*-unpacked
          # tools/build-appimage.sh ${{ steps.Tag.outputs.tag }} ${{ matrix.ARCH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-winpkg.build
          path: tmp/build

  # -------------------------- 上传产物（微调） --------------------------
  upload:
    name: Create release and upload artifacts
    needs:
      - build-linux-simple
      - build-linux-package
      - build-win
      - build-deepin
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Inspect directory after downloading artifacts
        run: |
          rm -rf ./bilibili-app.src
          ls -alFR

      - name: Generate TAG
        id: Tag
        run: |
          tag="continuous"
          name="Continuous Build"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${{ github.ref_name }}"
            name="${{ github.ref_name }}"
          fi
          echo "tag result: $tag - $name"
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT

      - name: Create release and upload artifacts (continuous)
        if: startsWith(github.ref, 'refs/heads/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt install -y fuse
          wget -q https://github.com/TheAssassin/pyuploadtool/releases/download/continuous/pyuploadtool-x86_64.AppImage
          chmod +x pyuploadtool-x86_64.AppImage
          ./pyuploadtool-x86_64.AppImage \
            **/build/*.tar.gz \
            **/build/*.AppImage \
            **/build/*.deb \
            **/build/*.exe \
            **/build/*.rpm

      - name: Release (tagged)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ${{ steps.Tag.outputs.name }}
          tag_name: ${{ steps.Tag.outputs.tag }}
          files: |
            **/build/*.tar.gz
            **/build/*.AppImage
            **/build/*.deb
            **/build/*.exe
            **/build/*.rpm

