# This workflow will build bilibili-linux packages across multiple architectures
# Optimized for dependency consistency, cache efficiency and syntax standardization
name: Build Packages

on:
  release:
    types: [published]
  push:
    tags:        
      - v*
    branches: [ master, dev, ci]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [ master ]
  workflow_dispatch: # 启用手动触发

jobs:
  build-app:
    name: Build Base Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
        ARCH: ['x64']

    steps:
      - uses: actions/checkout@v4  # 升级到最新版
        with:
          submodules: 'recursive'
          
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'  # 启用pnpm缓存，自动识别pnpm-lock.yaml

      - name: System Dependencies & Tool Setup
        run: |
          sudo apt update && sudo apt install -y wget exiftool
          sudo npm install -g asar
          corepack enable
          pnpm setup
          echo "export PATH=\$HOME/.local/share/pnpm:\$PATH" >> $GITHUB_ENV
          
      - name: Install Dependencies
        run: |
          pnpm install  # 统一使用pnpm，避免npm/pnpm混用
          echo "$UID, $GID"

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag result: $tag - $name"
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT

      - name: Build Core Resources
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          tools/update-bilibili.sh
          tools/fix-other.sh
          tools/extension.sh
          mv tmp/bili/resources/* app

      - name: Compress Resources
        run: |
          ls -l
          mkdir -p tmp/src tmp/build
          tar -zcf tmp/src/bilibili-asar-${{ steps.Tag.outputs.tag }}.tar.gz bin app
          cp tmp/src/bilibili-asar-${{ steps.Tag.outputs.tag }}.tar.gz tmp/build/
          tar -zcf tmp/build/extensions-${{ steps.Tag.outputs.tag }}.tar.gz dist/extension

      - name: Fix Continuous Build Naming
        if: steps.Tag.outputs.tag == 'continuous'
        run: |
          version=$(cat conf/bilibili_version)
          mv ./tmp/build/bilibili-asar-continuous.tar.gz ./tmp/build/bilibili-asar-${version}-continuous.tar.gz
          mv ./tmp/build/extensions-continuous.tar.gz ./tmp/build/extensions-${version}-continuous.tar.gz

      - name: Upload Source Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-app.build
          path: tmp/build

  build-linux-simple:
    name: Build Linux Archive (${{ matrix.ARCH }})
    needs: build-app
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x]
        ARCH: ['x64', 'arm64', 'loong64', 'loongarch64']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          
      - name: Download Base Artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
          
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: false  # 旧Node版本无需缓存

      - name: Prepare Build Environment
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          sudo apt install -y wget exiftool
          sudo npm install -g asar
          echo "$UID, $GID"
          ls -l
          tools/build-prepare.sh

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT

      - name: Build Linux Archive
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          tools/update-electron.sh

      - name: Compress Final Archive
        run: |
          ls -l
          mkdir -p tmp/build
          version=$(cat conf/bilibili_version)
          tar -zcf tmp/build/bilibili-${version}-${{ steps.Tag.outputs.tag }}-${{ matrix.ARCH }}.tar.gz bin app electron

      - name: Fix Tag Naming for Releases
        if: steps.Tag.outputs.tag != 'continuous'
        run: |
          version=$(cat conf/bilibili_version)
          mv ./tmp/build/bilibili-${version}-${{ steps.Tag.outputs.tag }}-${{ matrix.ARCH }}.tar.gz ./tmp/build/bilibili-${{ steps.Tag.outputs.tag }}-${{ matrix.ARCH }}.tar.gz

      - name: Upload Linux Archive
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-archive.build
          path: tmp/build

  build-linux-package:
    name: Build Linux Package (${{ matrix.ARCH }})
    needs: build-app
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ARCH: ['x64', 'loong64']

    steps:
      - uses: actions/checkout@v4
      
      - name: Download Base Artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
          
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Setup PNPM & Dependencies
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          sudo npm install -g asar
          corepack enable pnpm
          corepack use pnpm@latest
          pnpm install
          echo "$UID, $GID"

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT

      - name: Build Linux Package
        env:
          BUILD_VERSION: ${{ steps.Tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          mkdir -p tmp/build
          tools/build-prepare.sh
          asar e app/app.asar app/app
          if [[ "$BUILD_ARCH" == loong* ]]; then
            pnpm run pkg-loongarch
          else
            pnpm run pkg-linux
          fi
          rm -rf tmp/build/*-unpacked

      - name: Upload Linux Package
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-linuxpkg.build
          path: tmp/build

  build-win:
    name: Build Windows Package (${{ matrix.ARCH }})
    needs: build-app
    runs-on: ubuntu-latest
    container: scottyhardy/docker-wine
    strategy:
      matrix:
        ARCH: ['x64']

    steps:
      - uses: actions/checkout@v4
      
      - name: Download Base Artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
          
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'  # Windows构建使用npm缓存

      - name: Prepare Windows Build Env
        run: |
          set -x
          apt update && apt install -y wget
          npm install -g asar
          npm install
          echo "$UID"

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT

      - name: Build Windows Package
        env:
          BUILD_VERSION: ${{ steps.Tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ARCH: ${{ matrix.ARCH }}
        run: |
          ls -l
          sudo chown -R $(whoami) /github/home
          mkdir -p tmp/build
          tools/build-prepare.sh
          asar e app/app.asar app/app
          npm run pkg-win
          rm -rf tmp/build/*-unpacked

      - name: Upload Windows Package
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-winpkg.build
          path: tmp/build

  build-deepin:
    name: Build Deepin Package (${{ matrix.ARCH }})
    needs: build-app
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ARCH: ['x64', 'arm64', 'loong64']

    steps:
      - uses: actions/checkout@v4
      
      - name: Download Base Artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilibili-app.src
          path: tmp/src
          
      - name: Install Deb Build Dependencies
        run: |
          sudo apt update && sudo apt install -y \
            build-essential fakeroot devscripts debhelper

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          else
            BILIBILI_VERSION=$(cat conf/bilibili_version)
            tag="v${BILIBILI_VERSION}-${tag}"
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT

      - name: Build Deepin Deb Package
        env:
          BUILD_ARCH: ${{ matrix.ARCH }}
          BUILD_TAG: ${{ steps.Tag.outputs.tag }}
        run: |
          export BUILD_VERSION=${{ steps.Tag.outputs.tag }}
          ls -l
          mkdir -p tmp/build
          tools/build-prepare.sh
          
          # Architecture specific setup
          if [ "${{ matrix.ARCH }}" == "arm64" ]; then
            export LD_LIBRARY_PATH="/usr/aarch64-linux-gnu/lib"
          fi
          
          tools/update-electron.sh
          
          # Convert x64 to amd64 for deb packaging
          if [ "$BUILD_ARCH" == "x64" ]; then
            export BUILD_ARCH="amd64"
          fi
          
          dpkg --version
          
          # Loongarch specific build
          if [[ "$BUILD_ARCH" == loong* ]]; then
            echo "Building for LoongArch"
            export DOCKER_UID=$(id -u)
            export DOCKER_GID=$(id -g)
            cat /etc/passwd
            env
            tools/build-deepin-loongarch.sh
            if [ -f tmp/exit_code ]; then
              exit $(cat tmp/exit_code)
            fi
          else
            echo "Building standard Deepin package"
            tools/build-deepin.sh ${{ steps.Tag.outputs.tag }}
            mkdir -p info/DEBIAN
            dpkg -e ./tmp/build/io.github.msojocs.bilibili_*.deb info/DEBIAN
            ls -l info/DEBIAN
            rm -rf info
          fi

      - name: Upload Deepin Package
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-${{ matrix.ARCH }}-deepinpkg.build
          path: tmp/build

  upload:
    name: Release & Upload Artifacts
    needs:
      - build-linux-simple
      - build-linux-package
      - build-win
      - build-deepin
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
      
      - name: Cleanup & Inspect Artifacts
        run: |
          rm -rf ./bilibili-app.src
          ls -alFR

      - name: Generate TAG
        id: Tag
        run: |
          tag='continuous'
          name='Continuous Build'
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag='${{ github.ref_name }}'
            name='${{ github.ref_name }}'
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT

      - name: Upload Continuous Build Artifacts
        if: startsWith(github.ref, 'refs/heads/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt install -y fuse
          wget -q https://github.com/TheAssassin/pyuploadtool/releases/download/continuous/pyuploadtool-x86_64.AppImage
          chmod +x pyuploadtool-x86_64.AppImage
          ./pyuploadtool-x86_64.AppImage \
            **/*.tar.gz \
            **/*.AppImage \
            **/*.deb \
            **/*.exe \
            **/*.rpm

      - name: Create Tagged Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2  # 升级到最新版
        with:
          name: ${{ steps.Tag.outputs.name }}
          tag_name: ${{ steps.Tag.outputs.tag }}
          files: |
            **/*.tar.gz
            **/*.AppImage
            **/*.deb
            **/*.exe
            **/*.rpm
          draft: false
          prerelease: false
